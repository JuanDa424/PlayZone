spring.application.name=PlayZoneAPI

# --- Datasource ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/playzonebd}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgresueb}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${JPA_DDL:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true

# --- Server ---
server.port=${PORT:8080}
server.address=0.0.0.0

